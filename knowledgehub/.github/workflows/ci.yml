name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - "knowledgehub/**"
  pull_request:
    branches: [main]
    paths:
      - "knowledgehub/**"

defaults:
  run:
    working-directory: knowledgehub

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: |
          pip install poetry==1.8.4
          poetry config virtualenvs.in-project true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: knowledgehub/.venv
          key: venv-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('knowledgehub/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run linter
        run: poetry run ruff check src/ tests/

      - name: Run type checker
        run: poetry run mypy src/ --ignore-missing-imports
        continue-on-error: true

      - name: Run tests with coverage
        env:
          KNOWLEDGEHUB_PROFILE: mini
          KNOWLEDGEHUB_DATABASE_URL: "sqlite+aiosqlite:///:memory:"
        run: |
          poetry run pytest \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -v \
            --tb=short

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: knowledgehub/coverage.xml

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: |
          pip install poetry==1.8.4
          poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Ruff check
        run: poetry run ruff check src/ tests/

      - name: Ruff format check
        run: poetry run ruff format --check src/ tests/
