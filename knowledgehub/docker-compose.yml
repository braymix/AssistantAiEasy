# ============================================================================
# KnowledgeHub – Docker Compose (mini profile)
# ============================================================================
# Services: gateway, admin, ollama, open-webui, chroma
# Usage:    docker compose up -d
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # Gateway API
  # --------------------------------------------------------------------------
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    environment:
      - KNOWLEDGEHUB_PROFILE=mini
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///./data/sqlite/knowledgehub.db}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - VECTORSTORE_BACKEND=${VECTORSTORE_BACKEND:-chroma}
      - CHROMA_HOST=${CHROMA_HOST:-chroma}
      - CHROMA_PORT=${CHROMA_PORT:-8100}
      - KNOWLEDGEHUB_OPENWEBUI_URL=http://open-webui:8080
      - KNOWLEDGEHUB_OPENWEBUI_TOKEN=${OPENWEBUI_TOKEN:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - sqlite_data:/app/data/sqlite
      - log_data:/app/data/logs
    depends_on:
      ollama:
        condition: service_started
      chroma:
        condition: service_started
    restart: unless-stopped
    networks:
      - knowledgehub
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # --------------------------------------------------------------------------
  # Admin Dashboard API
  # --------------------------------------------------------------------------
  admin:
    build:
      context: .
      dockerfile: Dockerfile
      target: admin
    ports:
      - "${ADMIN_PORT:-8001}:8001"
    environment:
      - KNOWLEDGEHUB_PROFILE=mini
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///./data/sqlite/knowledgehub.db}
      - GATEWAY_URL=http://gateway:8000
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - sqlite_data:/app/data/sqlite
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - knowledgehub
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # --------------------------------------------------------------------------
  # Ollama (local LLM inference)
  # --------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - knowledgehub
    deploy:
      resources:
        limits:
          memory: 4G

  # --------------------------------------------------------------------------
  # ChromaDB (vector store)
  # --------------------------------------------------------------------------
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "${CHROMA_PORT:-8100}:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped
    networks:
      - knowledgehub
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # --------------------------------------------------------------------------
  # Open WebUI (chat frontend)
  # --------------------------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "${OPENWEBUI_PORT:-3000}:8080"
    environment:
      - OPENAI_API_BASE_URL=http://gateway:8000/v1
      - OPENAI_API_KEY=knowledgehub
      - OLLAMA_BASE_URL=
      - WEBUI_AUTH=${OPENWEBUI_AUTH:-true}
      - WEBUI_SECRET_KEY=${OPENWEBUI_SECRET:-changeme}
    volumes:
      - openwebui_data:/app/backend/data
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - knowledgehub
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

volumes:
  sqlite_data:
  log_data:
  ollama_data:
  chroma_data:
  openwebui_data:

networks:
  knowledgehub:
    driver: bridge
